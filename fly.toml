# Fly.io config — gives the app a stable always-on URL (https://<app>.fly.dev).
# One-time setup:
#   fly launch --copy-config --no-deploy    # pick an app name + region
#   fly volumes create data --size 1
#   fly secrets set DUFFEL_TOKEN=... SHARE_PASSWORD=...
#   fly deploy
app = "fly-with-me"
primary_region = "iad"

[build]

[env]
  PORT = "3000"
  DB_PATH = "/data/cache.db"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
